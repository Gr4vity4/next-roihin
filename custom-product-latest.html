<html lang="en">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom scrollbar for a cleaner look */
      .custom-scrollbar::-webkit-scrollbar {
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      /* Styling for the range slider thumb */
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: #4f46e5;
        cursor: pointer;
        border-radius: 50%;
        margin-top: -6px; /* Adjust to center */
      }
      input[type='range']::-moz-range-thumb {
        width: 20px;
        height: 20px;
        background: #4f46e5;
        cursor: pointer;
        border-radius: 50%;
      }
      /* Tab indicator line */
      .tab-indicator {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800">
    <div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

          <div>
            <span class="block text-xs text-gray-500 mb-1">Length</span>

              id="length-select"

              <option value="17">17 cm</option>
              <option value="18">18 cm</option>
              <option value="19">19 cm</option>
              <option value="20">20 cm</option>
            </select>
          </div>
          <div>
            <span class="block text-xs text-gray-500 mb-1">Pieces</span>
            <p class="text-sm font-semibold"><span id="piece-count">0</span></p>
          </div>
          <div class="col-span-2 md:col-span-1">
            <span class="block text-xs text-gray-500 mb-1">Price</span>
            <p class="text-2xl font-bold text-indigo-600">$<span id="price-total">0.00</span></p>
          </div>
        </div>

        <!-- Bracelet Visualizer and Controls -->
        <div class="relative flex flex-col md:flex-row items-center justify-center gap-8 mb-12">
          <div
            id="bracelet-visualizer-container"
            class="flex items-center justify-center relative transition-all duration-300"
          >
            <!-- A permanent circle to represent the bracelet base -->
            <div
              id="bracelet-circle"
              class="w-full h-full relative border-2 border-gray-800 rounded-full"
            >
              <!-- Bracelet items will be injected here -->
            </div>
          </div>
          <div
            class="flex items-center space-x-2 absolute bottom-0 right-0 md:relative md:bottom-auto md:right-auto"
          >
            <button
              id="undo-btn"
              title="Undo"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <svg
                class="w-5 h-5 text-gray-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 10h10a8 8 0 018 8v2M3 10l4-4m-4 4l4 4"
                ></path>
              </svg>
            </button>
            <button
              id="clear-btn"
              title="Clear All"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 6h18" />
                <path
                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Item Selector -->
        <div id="item-selector" class="border-t pt-6">
          <!-- Category Tabs -->
          <div class="relative border-b border-gray-200">
            <div id="tabs-container" class="flex space-x-6 text-sm font-medium text-gray-500">
              <button class="tab-btn py-3" data-category="crystal">Crystal</button>
              <button class="tab-btn py-3" data-category="accessories">Accessories</button>
              <button class="tab-btn py-3" data-category="shapedCrystal">Shaped Crystal</button>
            </div>
            <div
              id="tab-indicator"
              class="tab-indicator h-0.5 bg-indigo-600 absolute bottom-0"
            ></div>
          </div>

          <!-- Size Slider (for Crystals) -->
          <div id="size-slider-container" class="my-6 hidden">
            <div class="relative w-full max-w-sm mx-auto">
              <input
                id="size-slider"
                type="range"
                min="0"
                max="3"
                value="0"
                step="1"
                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
              />
              <div class="flex justify-between text-xs text-gray-500 mt-2 px-1">
                <span>6mm</span>
                <span>8mm</span>
                <span>10mm</span>
                <span>12mm</span>
              </div>
            </div>
          </div>

          <!-- Item Gallery -->

            id="item-gallery"
            class="custom-scrollbar flex items-center gap-4 mt-6 pb-4 overflow-x-auto min-h-[80px]"
          >
            <!-- Gallery items will be injected here -->
          </div>
        </div>
      </main>

        const saveHistory = () => {
          state.history.push(JSON.parse(JSON.stringify(state.braceletItems)))
        }

        const undo = () => {
          if (state.history.length > 1) {
            state.history.pop() // remove current state
            state.braceletItems = state.history[state.history.length - 1]
            renderAll()
          }
        }

        const clearBracelet = () => {
          if (state.braceletItems.length > 0) {
            saveHistory()
            state.braceletItems = []
            renderAll()
          }
        }

        const calculateTotalAngleSpan = (items) => {
          const radius = braceletCircle.offsetWidth / 2
          if (radius === 0 || !items || items.length === 0) return 0

          return items.reduce((totalAngle, item) => {
            const itemVisualWidth = item.data.imageWidth
            const chordToRadiusRatio = Math.min(itemVisualWidth / (2 * radius), 1)
            const itemAngleSpan = 2 * Math.asin(chordToRadiusRatio)
            return totalAngle + itemAngleSpan
          }, 0)
        }

        const addItem = (category, itemData) => {
          const currentAngleSpan = calculateTotalAngleSpan(state.braceletItems)
          const newItemAngleSpan = calculateTotalAngleSpan([{ data: itemData }])

          // Check if adding the new item would exceed the total circle angle (2 * PI radians)
          if (currentAngleSpan + newItemAngleSpan > 2 * Math.PI) {
            const notification = document.createElement('div')
            notification.className =
              'fixed top-5 right-5 bg-red-500 text-white py-2 px-4 rounded-lg shadow-lg animate-pulse'
            notification.textContent = 'Bracelet is full!'
            document.body.appendChild(notification)
            setTimeout(() => notification.remove(), 2000)
            return
          }

          saveHistory()
          state.braceletItems.push({
            id: `${itemData.id}-${Date.now()}`,
            category,
            data: itemData,
          })
          renderAll()
        }

          const size = visualizerSizeMap[selectedLength]
          if (size) {
            braceletVisualizerContainer.style.width = `${size}px`
            braceletVisualizerContainer.style.height = `${size}px`
          }
        }

        // --- RENDER FUNCTIONS ---

        const renderInfo = () => {
          const totalPieces = state.braceletItems.length
          const totalPrice = state.braceletItems.reduce((acc, item) => acc + item.data.price, 0)

          pieceCountEl.textContent = totalPieces
          priceTotalEl.textContent = totalPrice.toFixed(2)

          undoBtn.disabled = state.history.length <= 1
          clearBtn.disabled = state.braceletItems.length === 0
        }

        const renderBracelet = () => {
          braceletCircle.innerHTML = ''
          const itemCount = state.braceletItems.length

          if (itemCount === 0) {
            return // Nothing to render
          }

          const radius = braceletCircle.offsetWidth / 2
          if (radius === 0) return // Avoid calculations if element isn't rendered yet

          let currentAngle = Math.PI / 2 // Start at the bottom (6 o'clock)

          state.braceletItems.forEach((item, index) => {
            // Calculate the angle span based on the item's fixed visual width (as a chord on the circle).
            // This ensures items with fixed pixel sizes touch each other perfectly without gaps.
            const itemVisualWidth = item.data.imageWidth
            // Prevent Math.asin error if the item is wider than the circle diameter
            const chordToRadiusRatio = Math.min(itemVisualWidth / (2 * radius), 1)
            const itemAngleSpan = 2 * Math.asin(chordToRadiusRatio)

            const angle = currentAngle + itemAngleSpan / 2

            const x = radius * Math.cos(angle)
            const y = radius * Math.sin(angle)

            const itemEl = document.createElement('div')
            itemEl.className =
              'absolute cursor-pointer flex items-center justify-center transition-transform duration-200 hover:scale-110 hover:z-10'
            itemEl.style.left = `calc(50% + ${x}px)`
            itemEl.style.top = `calc(50% + ${y}px)`

            const rotationInDegrees = (angle * 180) / Math.PI - 90
            itemEl.style.transform = `translate(-50%, -50%) rotate(${rotationInDegrees}deg)`

            // --- SIZING LOGIC ---
            // Use the original, fixed image dimensions from the data to match the gallery size.
            itemEl.style.width = `${item.data.imageWidth}px`
            itemEl.style.height = `${item.data.imageHeight}px`

            itemEl.title = `Click to remove. Size: ${item.data.size}mm, Price: $${item.data.price}`

            // Use background images for all items
            itemEl.style.backgroundImage = `url('${item.data.imageUrl}')`
            itemEl.style.backgroundSize = item.data.imageHeight >= 64 ? 'contain' : 'cover'
            itemEl.style.backgroundPosition = 'center'
            itemEl.style.backgroundRepeat = 'no-repeat'

            itemEl.addEventListener('click', () => removeItem(item.id))
            braceletCircle.appendChild(itemEl)

            currentAngle += itemAngleSpan
          })
        }

        const renderGallery = () => {
          itemGallery.innerHTML = ''
          let itemsToRender = []

          if (state.currentCategory === 'crystal') {
            itemsToRender = mockData.crystal.filter(
              (item) => item.size === state.currentCrystalSize,
            )
          } else {
            itemsToRender = mockData[state.currentCategory]
          }

          if (itemsToRender.length === 0) {
            itemGallery.innerHTML = `<p class="text-sm text-gray-400 w-full text-center">No items available in this category.</p>`
            return
          }

          itemsToRender.forEach((itemData) => {
            const itemEl = document.createElement('div')
            itemEl.className =
              'flex-shrink-0 cursor-pointer flex items-center justify-center transition-transform duration-200 hover:scale-110 ring-2 ring-transparent hover:ring-indigo-400 p-1'
            itemEl.title = `Add to bracelet. Size: ${itemData.size}mm, Price: $${itemData.price}`

            let imageWidth, imageHeight

            if (itemData.imageWidth && itemData.imageHeight) {
              imageWidth = itemData.imageWidth
              imageHeight = itemData.imageHeight
            } else if (state.currentCategory === 'crystal') {
              // For crystals, derive gallery size from their actual size
              const gallerySize = itemData.size * 4
              imageWidth = gallerySize
              imageHeight = gallerySize
            } else {
              // Fallback size
              imageWidth = 48
              imageHeight = 48
            }

            itemEl.style.width = `${imageWidth}px`
            itemEl.style.height = `${imageHeight}px`

            const img = document.createElement('img')
            img.src = itemData.imageUrl
            img.alt = itemData.name || 'Bracelet component'
            img.className = `w-full h-full ${
              itemData.imageHeight >= 64 ? 'object-contain' : 'object-cover'
            }`
            img.onerror = () => {
              img.style.display = 'none'
              itemEl.innerHTML = '<span class="text-xs text-red-500">Img</span>'
            } // Handle broken images
            itemEl.appendChild(img)

            itemEl.addEventListener('click', () => addItem(state.currentCategory, itemData))
            itemGallery.appendChild(itemEl)
          })
        }

        const updateTabs = () => {
          const tabs = document.querySelectorAll('.tab-btn')
          let activeTab
          tabs.forEach((tab) => {
            if (tab.dataset.category === state.currentCategory) {
              tab.classList.add('text-indigo-600')
              tab.classList.remove('text-gray-500')
              activeTab = tab
            } else {
              tab.classList.remove('text-indigo-600')
              tab.classList.add('text-gray-500')
            }
          })

          if (activeTab) {
            tabIndicator.style.width = `${activeTab.offsetWidth}px`
            tabIndicator.style.left = `${activeTab.offsetLeft}px`
          }

          sizeSliderContainer.style.display = state.currentCategory === 'crystal' ? 'block' : 'none'
        }

        const renderAll = () => {
          renderInfo()
          renderBracelet()
          updateTabs()
          renderGallery()
        }

        // --- EVENT LISTENERS ---

        lengthSelect.addEventListener('change', (e) => {
          state.braceletLength = parseInt(e.target.value)
          updateVisualizerSize()
          renderAll()
        })

        tabsContainer.addEventListener('click', (e) => {
          if (e.target.classList.contains('tab-btn')) {
            state.currentCategory = e.target.dataset.category
            renderAll()
          }
        })

        sizeSlider.addEventListener('input', (e) => {
          const sizes = [6, 8, 10, 12]
          state.currentCrystalSize = sizes[e.target.value]
          renderGallery()
        })

        undoBtn.addEventListener('click', undo)
        clearBtn.addEventListener('click', clearBracelet)

        // Resize observer for responsive bracelet rendering
        new ResizeObserver(renderBracelet).observe(braceletCircle)

        // --- INITIALIZATION ---

        const init = () => {
          saveHistory()
          updateVisualizerSize()
          renderAll()
        }

        init()
      })
    </script>
  </body>
</html>
