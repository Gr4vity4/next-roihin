<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beads on a Circle — Wrist size</title>
    <style>
      :root {
        --stage: 520px; /* canvas size */
        --guide: 380px; /* DIAMETER of the centers-path circle (will be changed live) */
        --guide-border: 4px; /* black circle width */
        --line: 3px; /* red line width */
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #fafafa;
        color: #222;
      }
      header {
        padding: 18px 22px;
        font-weight: 600;
      }
      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 12px 22px 32px;
        display: grid;
        gap: 28px;
        grid-template-columns: minmax(420px, 1fr) 400px;
      }

      /* ===== Stage ===== */
      .stage {
        position: relative;
        width: var(--stage);
        height: var(--stage);
        max-width: 90vw;
        aspect-ratio: 1/1;
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.06);
        overflow: hidden;
      }
      .guide {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .guide__ring {
        position: absolute;
        width: var(--guide);
        height: var(--guide);
        border-radius: 50%;
        border: var(--guide-border) solid #0a0a0a;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        transition: width 0.35s ease, height 0.35s ease;
      }
      .guide__line {
        position: absolute;
        left: 50%;
        width: var(--line);
        transform: translateX(-50%);
        top: calc(50% - var(--guide) / 2);
        bottom: calc(50% - var(--guide) / 2);
        background: #ff2b2b;
        border-radius: 2px;
        z-index: 4;
        pointer-events: none;
      }
      .beads-layer {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }
      .bead {
        position: absolute;
        border-radius: 50%;
        box-shadow: inset 0 10px 18px rgba(255, 255, 255, 0.45),
          inset 0 -10px 22px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.2);
        transition: top 0.35s ease, left 0.35s ease, transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        transform: scale(0.6);
      }
      .bead.show {
        transform: scale(1);
      }

      /* ===== Controls ===== */
      .panel {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.06);
        padding: 16px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .btn {
        border: 1px solid #ddd;
        background: #fff;
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
      }
      .btn:hover {
        background: #f6f6f6;
      }
      .tray {
        display: grid;
        grid-template-columns: repeat(8, 44px);
        gap: 10px;
      }
      .swatch {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        border: 1px solid #dcdcdc;
        box-shadow: inset 0 10px 16px rgba(255, 255, 255, 0.5),
          inset 0 -10px 18px rgba(0, 0, 0, 0.22);
      }
      .swatch:active {
        transform: scale(0.95);
      }

      /* gem looks */
      .gem-rose {
        background: radial-gradient(circle at 40% 35%, #ffe8f1, #f6b8c7 60%, #d37892);
      }
      .gem-onyx {
        background: radial-gradient(circle at 35% 28%, #808080, #343434 60%, #141414);
      }
      .gem-quartz {
        background: radial-gradient(circle at 42% 35%, #ffffff, #e6eef2 60%, #b7c3cc);
      }
      .gem-amber {
        background: radial-gradient(circle at 40% 35%, #fff2b8, #f3b037 60%, #b56b07);
      }
      .gem-citrine {
        background: radial-gradient(circle at 45% 35%, #fff0a4, #f9cf54 60%, #c4971d);
      }
      .gem-emerald {
        background: radial-gradient(circle at 40% 35%, #c1f1d5, #2e9a6b 58%, #0f6a43);
      }
      .gem-sky {
        background: radial-gradient(circle at 45% 35%, #e8f7ff, #88c8f0 60%, #3d87c2);
      }
      .gem-rose2 {
        background: radial-gradient(circle at 45% 35%, #ffe9f2, #e9b8c9 60%, #c18295);
      }
    </style>
  </head>
  <body>
    <header>
      Click a bead to add. First goes to the bottom; each next goes to the left. Move
      <b>Wrist size</b> to change the radius — beads reflow smoothly, never overlapping.
    </header>

    <main class="app">
      <!-- Stage -->
      <section class="stage" id="stage">
        <div class="guide">
          <div class="guide__ring" id="ring"></div>
          <div class="guide__line"></div>
        </div>
        <div class="beads-layer" id="beadsLayer" aria-hidden="true"></div>
      </section>

      <!-- Controls -->
      <aside class="panel">
        <div class="row">
          <label for="wrist">Wrist size (circle Ø):</label>
          <!-- diameter in px for simplicity; clamped so all beads fit -->
          <input id="wrist" type="range" min="280" max="480" step="1" value="380" />
          <output id="wristOut">380 px</output>
        </div>

        <div class="row">
          <label for="size">Bead size (mm):</label>
          <input id="size" type="range" min="6" max="12" step="2" value="10" />
          <output id="sizeOut">10mm</output>
        </div>

        <div class="row" style="justify-content: space-between">
          <button class="btn" id="undoBtn">Undo</button>
          <button class="btn" id="clearBtn">Clear</button>
        </div>

        <p style="margin: 0.5rem 0 0.75rem; font-weight: 600">Bead tray</p>
        <div class="tray" id="tray">
          <div class="swatch gem-rose2" title="Rose"></div>
          <div class="swatch gem-onyx" title="Onyx"></div>
          <div class="swatch gem-quartz" title="Quartz"></div>
          <div class="swatch gem-amber" title="Amber"></div>
          <div class="swatch gem-citrine" title="Citrine"></div>
          <div class="swatch gem-emerald" title="Emerald"></div>
          <div class="swatch gem-sky" title="Sky"></div>
          <div class="swatch gem-rose" title="Rose 2"></div>
        </div>
      </aside>
    </main>

    <script>
      ;(() => {
        const stage = document.getElementById('stage')
        const ring = document.getElementById('ring')
        const beadsLayer = document.getElementById('beadsLayer')
        const tray = document.getElementById('tray')
        const sizeInput = document.getElementById('size')
        const sizeOut = document.getElementById('sizeOut')
        const undoBtn = document.getElementById('undoBtn')
        const clearBtn = document.getElementById('clearBtn')
        const wristInput = document.getElementById('wrist')
        const wristOut = document.getElementById('wristOut')

        // Visual px-per-mm used only for bead sizes
        const mmToPx = (mm) => mm * 3.4

        // Small breathing room between beads (px)
        const GAP_PX = 1.0
        const EPS = 0.002 // numeric tolerance (radians)

        // Geometry / state
        let beads = [] // { el, r(px), theta }
        const START = Math.PI / 2 // bottom anchor
        let thetaNext // angle of last placed bead
        let lastRadius = 0 // radius of last bead (px)
        let cx, cy, R // center coords and current centers-path radius (px)

        // --- initial geometry ---
        function computeCenter() {
          const rect = stage.getBoundingClientRect()
          cx = rect.width / 2
          cy = rect.height / 2
        }
        computeCenter()
        addEventListener('resize', computeCenter)

        // Read initial diameter from CSS var
        function getGuideDiameterFromCSS() {
          const v = getComputedStyle(stage).getPropertyValue('--guide').trim()
          return parseFloat(v)
        }
        R = getGuideDiameterFromCSS() / 2

        function setGuideDiameter(diamPX) {
          stage.style.setProperty('--guide', `${diamPX}px`) // updates ring + red line
          R = diamPX / 2
        }

        // --- layout / math helpers ---
        const clamp01m = (x) => Math.min(0.999999, Math.max(0, x))
        function deltaTheta(rA, rB, Rloc = R) {
          // exact chord spacing so centers are rA+rB (+gap) apart
          const ratio = clamp01m((rA + rB + GAP_PX) / (2 * Rloc))
          return 2 * Math.asin(ratio)
        }

        function totalAnglesWithClosing(Rloc) {
          if (beads.length <= 1) return 0
          let s = 0
          for (let i = 1; i < beads.length; i++) s += deltaTheta(beads[i - 1].r, beads[i].r, Rloc)
          s += deltaTheta(beads[beads.length - 1].r, beads[0].r, Rloc) // closing gap
          return s
        }

        function minRadiusForCurrentBeads() {
          if (beads.length === 0) return 0
          if (beads.length === 1) {
            // At least large enough so red line fits nicely; neighbor bound still applies
            return beads[0].r + GAP_PX // generous, actual bound handled below
          }
          // hard lower bound so asin() is defined for every adjacent pair including closing pair
          let lower = 0
          for (let i = 1; i < beads.length; i++)
            lower = Math.max(lower, (beads[i - 1].r + beads[i].r + GAP_PX) / 2)
          lower = Math.max(lower, (beads[beads.length - 1].r + beads[0].r + GAP_PX) / 2)

          let upper = 10000 // big number; we'll binary search down to minimum feasible
          // if already fits at lower, that's the minimum
          if (totalAnglesWithClosing(lower + 1e-6) <= 2 * Math.PI) return lower + 1e-6

          for (let iter = 0; iter < 40; iter++) {
            const mid = (lower + upper) / 2
            const used = totalAnglesWithClosing(mid)
            if (used > 2 * Math.PI) lower = mid // too tight -> need larger radius
            else upper = mid // fits -> try smaller
          }
          return upper
        }

        function relayoutForRadius(Rnew) {
          if (beads.length === 0) {
            thetaNext = START
            lastRadius = 0
            return
          }
          // place first at START
          let theta = START
          beads[0].theta = theta
          setPos(beads[0], Rnew)
          // place the rest CCW (left)
          for (let i = 1; i < beads.length; i++) {
            theta += deltaTheta(beads[i - 1].r, beads[i].r, Rnew)
            beads[i].theta = theta
            setPos(beads[i], Rnew)
          }
          thetaNext = beads[beads.length - 1].theta
          lastRadius = beads[beads.length - 1].r
        }

        function setPos(b, Rloc = R) {
          b.el.style.left = cx + Rloc * Math.cos(b.theta) - b.r + 'px'
          b.el.style.top = cy + Rloc * Math.sin(b.theta) - b.r + 'px'
        }

        function remainingArc() {
          return START + 2 * Math.PI - thetaNext
        }

        function canPlaceWithRadius(rNext) {
          if (beads.length === 0) return true
          const needBetweenPrevAndNext = deltaTheta(lastRadius, rNext)
          const rFirst = beads[0].r
          const needNextToFirst = deltaTheta(rNext, rFirst)
          return remainingArc() >= needBetweenPrevAndNext + needNextToFirst - EPS
        }

        function nudge(el = stage) {
          el.animate(
            [
              { transform: 'translateX(0)' },
              { transform: 'translateX(-6px)' },
              { transform: 'translateX(6px)' },
              { transform: 'translateX(0)' },
            ],
            { duration: 240, easing: 'ease-out' },
          )
        }

        // --- lifecycle helpers ---
        function resetLayout() {
          beads.forEach((b) => b.el.remove())
          beads = []
          thetaNext = START
          lastRadius = 0
        }

        // ====== Event wiring ======
        sizeInput.addEventListener('input', () => (sizeOut.value = `${sizeInput.value}mm`))

        tray.addEventListener('click', (e) => {
          const sw = e.target.closest('.swatch')
          if (!sw) return
          addBead(getComputedStyle(sw).backgroundImage)
        })

        undoBtn.addEventListener('click', () => {
          const r = beads.pop()
          if (!r) return
          r.el.remove()
          if (beads.length === 0) {
            thetaNext = START
            lastRadius = 0
          } else {
            thetaNext = beads[beads.length - 1].theta
            lastRadius = beads[beads.length - 1].r
            // ensure wrist radius still valid for remaining beads
            const minR = minRadiusForCurrentBeads()
            const targetDiam = Math.max(2 * minR, +wristInput.min)
            if (R < minR) {
              setGuideDiameter(targetDiam)
              relayoutForRadius(R)
              wristInput.value = Math.round(targetDiam)
              wristOut.value = `${Math.round(targetDiam)} px`
            }
          }
        })

        clearBtn.addEventListener('click', resetLayout)

        // Wrist size slider (diameter in px for simplicity)
        wristInput.addEventListener('input', () => {
          let diam = +wristInput.value
          // Clamp to minimum radius required by current beads
          const minR = minRadiusForCurrentBeads()
          if (diam / 2 < minR) {
            diam = Math.max(2 * minR, +wristInput.min)
            wristInput.value = Math.round(diam)
            nudge() // too small for current beads
          }
          setGuideDiameter(diam)
          relayoutForRadius(R) // smooth transition via CSS
          wristOut.value = `${Math.round(diam)} px`
        })

        // ====== Add bead ======
        function addBead(backgroundImage) {
          const mm = Number(sizeInput.value)
          const d = mmToPx(mm)
          const r = d / 2

          // Hard stop if it won't fit at current radius
          if (!canPlaceWithRadius(r)) {
            nudge()
            return
          }

          const el = document.createElement('div')
          el.className = 'bead'
          el.style.width = d + 'px'
          el.style.height = d + 'px'
          el.style.backgroundImage = backgroundImage

          // first bead at START, others spaced by exact chord distance
          const dTheta = beads.length === 0 ? 0 : deltaTheta(lastRadius, r)
          const theta = beads.length === 0 ? START : thetaNext + dTheta

          const bead = { el, r, theta }
          beadsLayer.appendChild(el)
          setPos(bead) // initial position
          requestAnimationFrame(() => el.classList.add('show'))

          beads.push(bead)
          thetaNext = theta
          lastRadius = r

          // After adding, ensure wrist slider can't shrink below the new minimum
          const minR = minRadiusForCurrentBeads()
          const minDiam = Math.max(2 * minR, +wristInput.min)
          if (R < minR) {
            setGuideDiameter(minDiam)
            relayoutForRadius(R)
            wristInput.value = Math.round(minDiam)
            wristOut.value = `${Math.round(minDiam)} px`
          }
        }

        // Init outputs
        sizeOut.value = `${sizeInput.value}mm`
        wristOut.value = `${wristInput.value} px`
      })()
    </script>
  </body>
</html>
